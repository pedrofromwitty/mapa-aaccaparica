<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <title>Mapa Interativo — Caparica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
  <style>
    html, body { height:100%; margin:0; }
    #map { height:100%; }

    .legend {
      background:#fff;
      padding:8px 10px;
      font:14px/16px system-ui, Arial, sans-serif;
      box-shadow:0 0 15px rgba(0,0,0,.2);
      border-radius:6px;
    }

    .legend .item {
      display:flex;
      align-items:center;
      margin:4px 0;
    }

    .legend .swatch {
      width:12px;
      height:12px;
      margin-right:8px;
      opacity:.85;
      flex: 0 0 12px;
    }

    .leaflet-popup-content h3 {
      margin:.2em 0 .5em;
      font-size:16px;
      line-height:1.2;
    }

    .leaflet-popup-content div {
      margin:4px 0;
    }
  </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1) Mapa
  const map = L.map('map', { scrollWheelZoom:true }).setView([38.6338, -9.2379], 14);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors'
  }).addTo(map);

  // 2) Cores
  const cores = {
    concluida: '#2E7D32',
    mesAtual:  '#E53935',
    futura:    '#FB8C00'
  };

  // 3) Metadados por zona
  // previsao deve estar no formato:
  // - "abril 2026"
  // - "maio 2026"
  // - "abril/maio 2026"
  // - "maio/junho 2026"
  const zonasMeta = [
    { zona: 10, label: 'EV1 - Setor Norte',   previsao: 'abril 2026' },
    { zona: 9,  label: 'EV1 - Setor Central', previsao: 'abril/maio 2026' },
    { zona: 8,  label: 'EV1 - Setor Sul',     previsao: 'abril/maio 2026' },
    { zona: 7,  label: 'EC7',                 previsao: 'maio 2026' },
    { zona: 6,  label: 'EC6',                 previsao: 'maio 2026' },
    { zona: 5,  label: 'EC5',                 previsao: 'maio 2026' },
    { zona: 4,  label: 'EC4',                 previsao: 'maio 2026' },
    { zona: 3,  label: 'EC3',                 previsao: 'maio 2026' },
    { zona: 2,  label: 'EC2',                 previsao: 'maio/junho 2026' },
    { zona: 1,  label: 'EC1',                 previsao: 'maio/junho 2026' }
  ];

  const metaMap = new Map(zonasMeta.map(item => [String(item.zona), item]));

  // 4) GeoJSON das zonas
  const zonasGeoJSON = {
    "type": "FeatureCollection",
    "features": [
      {
        "type":"Feature",
        "properties":{"zona":10},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.256239,38.661344],
          [-9.258084,38.660590],
          [-9.254158,38.657689],
          [-9.252741,38.658628],
          [-9.256239,38.661344]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":9},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.252870,38.658621],
          [-9.254007,38.657699],
          [-9.250188,38.654480],
          [-9.249029,38.655486],
          [-9.252870,38.658621]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":8},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.250124,38.654446],
          [-9.249029,38.655418],
          [-9.246433,38.651646],
          [-9.247441,38.651227],
          [-9.250124,38.654446]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":7},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.24742,38.650845],
          [-9.24624,38.651348],
          [-9.244609,38.648984],
          [-9.245682,38.648565],
          [-9.24742,38.650845]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":6},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.245639,38.648162],
          [-9.24448,38.648682],
          [-9.242806,38.646301],
          [-9.243922,38.645932],
          [-9.245639,38.648162]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":5},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.243751,38.645479],
          [-9.242592,38.64605],
          [-9.241047,38.643769],
          [-9.242249,38.64335],
          [-9.243751,38.645479]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":4},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.242034,38.643031],
          [-9.240875,38.643551],
          [-9.240446,38.642998],
          [-9.239502,38.64283],
          [-9.237957,38.641019],
          [-9.239845,38.640231],
          [-9.242034,38.643031]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":3},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.239631,38.639845],
          [-9.23785,38.640717],
          [-9.236348,38.63894],
          [-9.238365,38.638051],
          [-9.239631,38.639845]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":2},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.23815,38.637799],
          [-9.236026,38.638755],
          [-9.234352,38.636458],
          [-9.235919,38.63577],
          [-9.23815,38.637799]
        ]]}
      },
      {
        "type":"Feature",
        "properties":{"zona":1},
        "geometry":{"type":"Polygon","coordinates":[[
          [-9.234138,38.63629],
          [-9.235361,38.635552],
          [-9.232399,38.632466],
          [-9.230769,38.633372],
          [-9.231884,38.634395],
          [-9.2327,38.634697],
          [-9.234138,38.63629]
        ]]}
      }
    ]
  };

  // 5) Helpers de meses
  const meses = {
    'janeiro': 0,
    'fevereiro': 1,
    'março': 2,
    'marco': 2,
    'abril': 3,
    'maio': 4,
    'junho': 5,
    'julho': 6,
    'agosto': 7,
    'setembro': 8,
    'outubro': 9,
    'novembro': 10,
    'dezembro': 11
  };

  function parsePrevisao(previsao) {
    // Exemplos aceites:
    // "abril 2026"
    // "abril/maio 2026"
    // "maio/junho 2026"
    const txt = (previsao || '').trim().toLowerCase();
    if (!txt) return null;

    const parts = txt.split(' ');
    if (parts.length < 2) return null;

    const mesesParte = parts[0];
    const ano = parseInt(parts[1], 10);
    if (isNaN(ano)) return null;

    const mesesTexto = mesesParte.split('/');
    const mesesNumericos = mesesTexto
      .map(m => meses[m])
      .filter(m => Number.isInteger(m));

    if (!mesesNumericos.length) return null;

    return {
      ano,
      meses: mesesNumericos
    };
  }

  function estadoPorPrevisao(previsao, refDate = new Date()) {
    const parsed = parsePrevisao(previsao);
    if (!parsed) return 'futura';

    const anoAtual = refDate.getFullYear();
    const mesAtual = refDate.getMonth();

    const mesesAbsolutos = parsed.meses.map(m => parsed.ano * 12 + m);
    const atualAbsoluto = anoAtual * 12 + mesAtual;

    const minPrev = Math.min(...mesesAbsolutos);
    const maxPrev = Math.max(...mesesAbsolutos);

    if (atualAbsoluto < minPrev) return 'futura';
    if (atualAbsoluto > maxPrev) return 'concluida';
    return 'mesAtual';
  }

  function labelEstado(estado) {
    if (estado === 'concluida') {
      return 'Intervenção concluída';
    }
    if (estado === 'mesAtual') {
      return 'Intervenção prevista para este mês (podem ocorrer condicionamentos)';
    }
    return 'Intervenção planeada';
  }

  // 6) Desenho das zonas
  const hoje = new Date();

  const layer = L.geoJSON(zonasGeoJSON, {
    style: function(feature) {
      const z = String(feature.properties.zona);
      const meta = metaMap.get(z);
      const estado = estadoPorPrevisao(meta?.previsao, hoje);

      return {
        color: '#222',
        weight: 1.5,
        fillColor: cores[estado],
        fillOpacity: 0.5
      };
    },
    onEachFeature: function(feature, layerItem) {
      const z = String(feature.properties.zona);
      const meta = metaMap.get(z) || {};
      const label = meta.label || `Zona ${z}`;
      const previsao = meta.previsao || '—';
      const estado = estadoPorPrevisao(previsao, hoje);

      layerItem.bindPopup(
        `<h3>${label}</h3>
         <div><b>Estado:</b> ${labelEstado(estado)}</div>
         <div><b>Previsão:</b> ${previsao}</div>`
      );

      layerItem.on('mouseover', function() {
        layerItem.setStyle({ weight: 3, fillOpacity: 0.6 });
      });

      layerItem.on('mouseout', function() {
        layerItem.setStyle({ weight: 1.5, fillOpacity: 0.5 });
      });
    }
  }).addTo(map);

  map.fitBounds(layer.getBounds(), { padding:[20,20] });

  // 7) Legenda
  const legend = L.control({ position:'bottomright' });

  legend.onAdd = function() {
    const div = L.DomUtil.create('div', 'legend');
    div.innerHTML = `
      <div class="item">
        <span class="swatch" style="background:${cores.concluida}"></span>
        Intervenção concluída
      </div>
      <div class="item">
        <span class="swatch" style="background:${cores.mesAtual}"></span>
        Intervenção prevista para este mês (podem ocorrer condicionamentos)
      </div>
      <div class="item">
        <span class="swatch" style="background:${cores.futura}"></span>
        Intervenção planeada
      </div>
    `;
    return div;
  };

  legend.addTo(map);
</script>
</body>
</html>
